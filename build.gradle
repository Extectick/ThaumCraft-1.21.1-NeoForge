plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.1.27'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')
    // Dev runs use sourceSets.main as the universal runtime; include both side service providers.
    srcDir('src/client/resources')
    srcDir('src/server/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

repositories {
    maven {
        name = 'IllusiveC4'
        url = 'https://maven.theillusivec4.top/'
    }
}

base {
    archivesName = mod_id
}

sourceSets {
    api {
        java {
            srcDir 'src/main/java'
            include 'thaumcraft/api/**/*.java'
        }
        resources.srcDirs = []
    }
    common {
        java {
            srcDir 'src/main/java'
            include 'thaumcraft/Thaumcraft.java'
            include 'thaumcraft/common/**/*.java'
        }
        resources {
            srcDir 'src/main/resources'
            srcDir 'src/generated/resources'
            exclude 'assets/thaumcraft/**'
            exclude '**/*.bbmodel'
            exclude 'src/generated/**/.cache'
        }
    }
    client {
        java {
            srcDir 'src/main/java'
            include 'thaumcraft/client/**/*.java'
        }
        resources {
            setSrcDirs(['src/main/resources', 'src/generated/resources', 'src/client/resources'])
            include 'assets/thaumcraft/**'
            include 'META-INF/services/**'
            exclude '**/*.bbmodel'
            exclude 'src/generated/**/.cache'
        }
    }
    server {
        java {
            srcDir 'src/main/java'
            include 'thaumcraft/server/**/*.java'
        }
        resources.setSrcDirs(['src/server/resources'])
    }
}

// Mojang ships Java 21 to end users in 1.21.1, so mods should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

//minecraft.accessTransformers.file rootProject.file('src/main/resources/META-INF/accesstransformer.cfg')
//minecraft.accessTransformers.entry public net.minecraft.client.Minecraft textureManager # textureManager

// Default run configurations.
// These can be tweaked, removed, or duplicated as needed.
runs {
    // applies to all the run configs below
    configureEach {
        // Recommended logging data for a userdev environment
        // The markers can be added/remove as needed separated by commas.
        // "SCAN": For mods scan.
        // "REGISTRIES": For firing of registry events.
        // "REGISTRYDUMP": For getting the contents of all registries.
        systemProperty 'forge.logging.markers', ''

        // Recommended logging level for the console
        // You can set various levels here.
        // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
        systemProperty 'forge.logging.console.level', 'debug'

        workingDirectory project.layout.projectDirectory.dir('run').dir(name)

        modSource project.sourceSets.main
    }

    client {
        // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
        systemProperty 'neoforge.enabledGameTestNamespaces', ''
    }

    server {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        argument '--nogui'
    }

    // This run config launches GameTestServer and runs all registered gametests, then exits.
    // By default, the server will crash when no gametests are provided.
    // The gametest system is also enabled by default for other run configs under the /test command.
    gameTestServer {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    data {
        // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
        // workingDirectory project.file('run-data')

        // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
        arguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
    apiImplementation.extendsFrom implementation
    commonImplementation.extendsFrom implementation
    clientImplementation.extendsFrom implementation
    serverImplementation.extendsFrom implementation
    apiCompileOnly.extendsFrom compileOnly
    commonCompileOnly.extendsFrom compileOnly
    clientCompileOnly.extendsFrom compileOnly
    serverCompileOnly.extendsFrom compileOnly
}

dependencies {
    // Specify the version of Minecraft to use.
    // Depending on the plugin applied there are several options. We will assume you applied the userdev plugin as shown above.
    // The group for userdev is net.neoforged, the module name is neoforge, and the version is the same as the neoforge version.
    // You can however also use the vanilla plugin (net.neoforged.gradle.vanilla) to use a version of Minecraft without the neoforge loader.
    // And its provides the option to then use net.minecraft as the group, and one of; client, server or joined as the module name, plus the game version as version.
    // For all intends and purposes: You can treat this dependency as if it is a normal library you would use.
    implementation "net.neoforged:neoforge:${neo_version}"

    compileOnly "top.theillusivec4.curios:curios-neoforge:${curios_version}:api"
    runtimeOnly "top.theillusivec4.curios:curios-neoforge:${curios_version}"
    compileOnly files("libs/jei-1.21.1-neoforge-19.27.0.340.jar")
    localRuntime files("libs/jei-1.21.1-neoforge-19.27.0.340.jar")

    // Example optional mod dependency with JEI
    // The JEI API is declared for compile time use, while the full JEI artifact is used at runtime
    // compileOnly "mezz.jei:jei-${mc_version}-common-api:${jei_version}"
    // compileOnly "mezz.jei:jei-${mc_version}-neoforge-api:${jei_version}"
    // We add the full version to localRuntime, not runtimeOnly, so that we do not publish a dependency on it
    // localRuntime "mezz.jei:jei-${mc_version}-neoforge:${jei_version}"

    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
// When "copyIdeResources" is enabled, this will also run before the game launches in IDE environments.
// See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
            curios_version         : curios_version,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

sourceSets.common.compileClasspath += sourceSets.api.output
sourceSets.common.runtimeClasspath += sourceSets.api.output
sourceSets.client.compileClasspath += sourceSets.api.output + sourceSets.common.output
sourceSets.client.runtimeClasspath += sourceSets.api.output + sourceSets.common.output
sourceSets.server.compileClasspath += sourceSets.api.output + sourceSets.common.output
sourceSets.server.runtimeClasspath += sourceSets.api.output + sourceSets.common.output

tasks.register('checkCommonSideSafety') {
    group = 'verification'
    description = 'Fails when api/common Java sources import client-only Minecraft classes.'

    def forbiddenPatterns = [
            'import net.minecraft.client',
            'import com.mojang.blaze3d',
            'import net.minecraft.client.gui',
            'import net.minecraft.client.renderer',
            'import thaumcraft.client',
            'import thaumcraft.server'
    ]
    def checkedSources = fileTree('src/main/java') {
        include 'thaumcraft/api/**/*.java'
        include 'thaumcraft/common/**/*.java'
    }
    def projectRoot = layout.projectDirectory.asFile.toPath()

    inputs.files(checkedSources)

    doLast {
        def violations = []
        checkedSources.files.each { sourceFile ->
            def text = sourceFile.getText('UTF-8')
            forbiddenPatterns.each { pattern ->
                if (text.contains(pattern)) {
                    violations.add("${projectRoot.relativize(sourceFile.toPath())} contains '${pattern}'")
                }
            }
        }
        if (!violations.isEmpty()) {
            throw new GradleException("Client-only imports are forbidden in api/common:\n" + violations.join('\n'))
        }
    }
}

tasks.named('check').configure {
    dependsOn tasks.named('checkCommonSideSafety')
}

tasks.register('checkNoCommonReflectionSideDispatch') {
    group = 'verification'
    description = 'Fails when api/common Java sources reintroduce string/reflection based side dispatch.'

    def forbiddenPatterns = [
            'Class.forName',
            'CLIENT_HANDLER',
            'SERVER_HANDLER',
            'SERVICE_CLASS',
            'SERVER_INFUSION_RUNTIME',
            'getMethod(',
            '.invoke('
    ]
    def checkedSources = fileTree('src/main/java') {
        include 'thaumcraft/api/**/*.java'
        include 'thaumcraft/common/**/*.java'
    }
    def projectRoot = layout.projectDirectory.asFile.toPath()

    inputs.files(checkedSources)

    doLast {
        def violations = []
        checkedSources.files.each { sourceFile ->
            def text = sourceFile.getText('UTF-8')
            forbiddenPatterns.each { pattern ->
                if (text.contains(pattern)) {
                    violations.add("${projectRoot.relativize(sourceFile.toPath())} contains '${pattern}'")
                }
            }
        }
        if (!violations.isEmpty()) {
            throw new GradleException("Reflection based side dispatch is forbidden in api/common:\n" + violations.join('\n'))
        }
    }
}

tasks.named('check').configure {
    dependsOn tasks.named('checkNoCommonReflectionSideDispatch')
}

def variantJarName = { String variant ->
    "Thaumcraft-${minecraft_version}-${variant}.jar"
}

tasks.register('apiJar', Jar) {
    group = 'build'
    description = 'Builds the public Thaumcraft API jar from the api logical source set.'
    dependsOn tasks.named('apiClasses')
    archiveFileName = variantJarName('api')
    destinationDirectory = layout.buildDirectory.dir('libs')
    from sourceSets.api.output
}

tasks.register('commonJar', Jar) {
    group = 'build'
    description = 'Builds the shared Thaumcraft common jar from api + common logical source sets.'
    dependsOn tasks.named('apiClasses'), tasks.named('commonClasses')
    archiveFileName = variantJarName('common')
    destinationDirectory = layout.buildDirectory.dir('libs')
    from sourceSets.api.output
    from sourceSets.common.output
}

tasks.register('clientJar', Jar) {
    group = 'build'
    description = 'Builds the client-side Thaumcraft variant jar from api + common + client source sets.'
    dependsOn tasks.named('apiClasses'), tasks.named('commonClasses'), tasks.named('clientClasses')
    archiveFileName = variantJarName('client')
    destinationDirectory = layout.buildDirectory.dir('libs')
    from sourceSets.api.output
    from sourceSets.common.output
    from sourceSets.client.output
}

tasks.register('serverJar', Jar) {
    group = 'build'
    description = 'Builds the dedicated-server Thaumcraft variant jar from api + common + server source sets.'
    dependsOn tasks.named('apiClasses'), tasks.named('commonClasses'), tasks.named('serverClasses')
    archiveFileName = variantJarName('server')
    destinationDirectory = layout.buildDirectory.dir('libs')
    from sourceSets.api.output
    from sourceSets.common.output
    from sourceSets.server.output
}

tasks.register('universalJar', Jar) {
    group = 'build'
    description = 'Builds the universal Thaumcraft variant jar from api + common + client + server source sets.'
    dependsOn tasks.named('apiClasses'), tasks.named('commonClasses'), tasks.named('clientClasses'), tasks.named('serverClasses')
    archiveFileName = variantJarName('universal')
    destinationDirectory = layout.buildDirectory.dir('libs')
    from sourceSets.api.output
    from sourceSets.common.output
    from sourceSets.client.output
    from sourceSets.server.output
}

tasks.register('buildVariantJars') {
    group = 'build'
    description = 'Builds client, server, and universal Thaumcraft variant jars.'
    dependsOn tasks.named('clientJar'), tasks.named('serverJar'), tasks.named('universalJar')
}

tasks.register('buildLayerJars') {
    group = 'build'
    description = 'Builds the api and common layer jars.'
    dependsOn tasks.named('apiJar'), tasks.named('commonJar')
}

tasks.register('checkVariantJars') {
    group = 'verification'
    description = 'Verifies that client/server variant jars do not contain opposite-side implementation packages.'
    dependsOn tasks.named('buildVariantJars')

    def clientJarFile = tasks.named('clientJar', Jar).flatMap { it.archiveFile }
    def serverJarFile = tasks.named('serverJar', Jar).flatMap { it.archiveFile }
    def universalJarFile = tasks.named('universalJar', Jar).flatMap { it.archiveFile }
    inputs.files(clientJarFile, serverJarFile, universalJarFile)

    doLast {
        def jarContains = { File jarFile, String prefix ->
            def zip = new java.util.zip.ZipFile(jarFile)
            try {
                return zip.entries().any { entry -> entry.name.startsWith(prefix) }
            } finally {
                zip.close()
            }
        }

        if (jarContains(clientJarFile.get().asFile, 'thaumcraft/server/')) {
            throw new GradleException('Client variant contains server implementation classes.')
        }
        if (jarContains(serverJarFile.get().asFile, 'thaumcraft/client/')) {
            throw new GradleException('Server variant contains client implementation classes.')
        }
        if (!jarContains(universalJarFile.get().asFile, 'thaumcraft/client/')
                || !jarContains(universalJarFile.get().asFile, 'thaumcraft/server/')) {
            throw new GradleException('Universal variant must contain both client and server implementation packages.')
        }
    }
}

tasks.named('check').configure {
    dependsOn tasks.named('checkVariantJars')
}

tasks.register('checkVariantServiceProviders') {
    group = 'verification'
    description = 'Verifies side-specific ServiceLoader provider files are present only in the correct variant jars.'
    dependsOn tasks.named('buildVariantJars')

    def clientJarFile = tasks.named('clientJar', Jar).flatMap { it.archiveFile }
    def serverJarFile = tasks.named('serverJar', Jar).flatMap { it.archiveFile }
    def universalJarFile = tasks.named('universalJar', Jar).flatMap { it.archiveFile }
    inputs.files(clientJarFile, serverJarFile, universalJarFile)

    doLast {
        def entries = { File jarFile ->
            def zip = new java.util.zip.ZipFile(jarFile)
            try {
                return zip.entries().collect { it.name } as Set
            } finally {
                zip.close()
            }
        }

        def clientEntries = entries(clientJarFile.get().asFile)
        def serverEntries = entries(serverJarFile.get().asFile)
        def universalEntries = entries(universalJarFile.get().asFile)
        def clientService = 'META-INF/services/thaumcraft.common.services.ThaumcraftClientServices'
        def serverService = 'META-INF/services/thaumcraft.common.services.ThaumcraftServerServices'

        if (!clientEntries.contains(clientService)) {
            throw new GradleException('Client variant is missing the client ServiceLoader provider file.')
        }
        if (clientEntries.contains(serverService)) {
            throw new GradleException('Client variant must not contain the server ServiceLoader provider file.')
        }
        if (!serverEntries.contains(serverService)) {
            throw new GradleException('Server variant is missing the server ServiceLoader provider file.')
        }
        if (serverEntries.contains(clientService)) {
            throw new GradleException('Server variant must not contain the client ServiceLoader provider file.')
        }
        if (!universalEntries.contains(clientService) || !universalEntries.contains(serverService)) {
            throw new GradleException('Universal variant must contain both ServiceLoader provider files.')
        }
    }
}

tasks.named('check').configure {
    dependsOn tasks.named('checkVariantServiceProviders')
}

tasks.register('checkDevRuntimeServiceProviders') {
    group = 'verification'
    description = 'Verifies universal dev runs have both client and server ServiceLoader providers on sourceSets.main.'
    dependsOn tasks.named('processResources')

    def resourcesDir = layout.buildDirectory.dir('resources/main')
    inputs.dir(resourcesDir)

    doLast {
        def clientService = resourcesDir.get().file('META-INF/services/thaumcraft.common.services.ThaumcraftClientServices').asFile
        def serverService = resourcesDir.get().file('META-INF/services/thaumcraft.common.services.ThaumcraftServerServices').asFile
        def missingServices = []
        if (!clientService.isFile()) {
            missingServices.add(clientService)
        }
        if (!serverService.isFile()) {
            missingServices.add(serverService)
        }
        if (!missingServices.isEmpty()) {
            throw new GradleException('Universal dev runtime is missing ServiceLoader provider files:\n'
                    + missingServices.collect { project.relativePath(it) }.join('\n'))
        }
    }
}

tasks.named('check').configure {
    dependsOn tasks.named('checkDevRuntimeServiceProviders')
}

tasks.register('checkProtectedClientJar') {
    group = 'verification'
    description = 'Fails when protected server implementation classes leak into the client variant jar.'
    dependsOn tasks.named('clientJar')

    def clientJarFile = tasks.named('clientJar', Jar).flatMap { it.archiveFile }
    inputs.files(clientJarFile)

    doLast {
        def protectedFragments = [
                'thaumcraft/server/',
                'ServerResearchService',
                'ServerWarpService',
                'ServerWandService',
                'ServerInfusionRuntime',
                'ServerEssentiaService',
                'ServerEssentiaTransportService',
                'ServerFluxService',
                'ServerArcaneWorktableService',
                'ServerObjectAspectRegistry',
                'InfusionCrafting',
                'InfusionAltarBuilder',
                'InfusionAltarScan',
                'RunicShieldEvents',
                'TCCommands'
        ]
        def zip = new java.util.zip.ZipFile(clientJarFile.get().asFile)
        try {
            def leaks = zip.entries()
                    .collect { it.name }
                    .findAll { entryName -> protectedFragments.any { fragment -> entryName.contains(fragment) } }
            if (!leaks.isEmpty()) {
                throw new GradleException('Client variant contains protected server implementation entries:\n' + leaks.join('\n'))
            }
        } finally {
            zip.close()
        }
    }
}

tasks.named('check').configure {
    dependsOn tasks.named('checkProtectedClientJar')
}

tasks.register('checkLogicalSourceSets') {
    group = 'verification'
    description = 'Compiles api/common/client/server logical source sets to enforce split boundaries.'
    dependsOn tasks.named('apiClasses'), tasks.named('commonClasses'), tasks.named('clientClasses'), tasks.named('serverClasses')
}

tasks.named('check').configure {
    dependsOn tasks.named('checkLogicalSourceSets')
}

def physicalSplitProjects = [
        ':thaumcraft-api',
        ':thaumcraft-common',
        ':thaumcraft-client',
        ':thaumcraft-server',
        ':thaumcraft-universal',
        ':thaumcraft-datagen',
        ':thaumcraft-gametest'
]
def missingPhysicalSplitProjects = physicalSplitProjects.findAll { projectPath -> !findProject(projectPath) }

tasks.register('checkPhysicalSubprojects') {
    group = 'verification'
    description = 'Verifies that the physical Gradle split entrypoint projects are included.'

    doLast {
        def missingProjects = missingPhysicalSplitProjects
        if (!missingProjects.isEmpty()) {
            throw new GradleException('Missing physical split projects: ' + missingProjects.join(', '))
        }
    }
}

tasks.named('check').configure {
    dependsOn tasks.named('checkPhysicalSubprojects')
}

tasks.register('checkSplitArchitecture') {
    group = 'verification'
    description = 'Runs all architecture split compile, side-safety, and variant jar checks.'
    dependsOn tasks.named('checkCommonSideSafety')
    dependsOn tasks.named('checkNoCommonReflectionSideDispatch')
    dependsOn tasks.named('checkLogicalSourceSets')
    dependsOn tasks.named('checkPhysicalSubprojects')
    dependsOn tasks.named('buildLayerJars')
    dependsOn tasks.named('buildVariantJars')
    dependsOn tasks.named('checkVariantJars')
    dependsOn tasks.named('checkVariantServiceProviders')
    dependsOn tasks.named('checkDevRuntimeServiceProviders')
    dependsOn tasks.named('checkProtectedClientJar')
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
